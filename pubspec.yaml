name: secure_wipe_app
description: App segura con login, almacenamiento encriptado y Wipe Remoto vía FCM
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.3.0
  firebase_messaging: ^15.1.0
  flutter_secure_storage: ^9.2.2
  email_validator: ^2.1.17
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true