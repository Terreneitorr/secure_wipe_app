name: secure_wipe_app
description: App segura con login, almacenamiento encriptado, Wipe Remoto y Control de Inactividad
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.3.0
  firebase_messaging: ^15.1.0

  # Almacenamiento seguro encriptado
  flutter_secure_storage: ^9.2.2

  # Validación de email
  email_validator: ^2.1.17

  # Shared preferences
  shared_preferences: ^2.3.2

  # Gestión de estado para el temporizador de inactividad
  flutter_bloc: ^8.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
